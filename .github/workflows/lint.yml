name: lint
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  run-black-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install CadQuery and pytest
        shell: bash --login {0}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -e .[dev]
      - name: Run tests
        shell: bash --login {0}
        run: |
          black --diff --check .
